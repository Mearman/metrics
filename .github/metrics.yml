# Omit `user` to auto-detect from the repository owner (fork mode)
# user: Mearman
timezone: Europe/London
template: classic

repos:
  fetch: all
  rules:
    - match: { visibility: private }
      action: count

outputs:
  - path: output/github-metrics.svg
    format: svg
    plugins:
      base:
        sections: [header, activity, community, repositories, metadata]
        indepth: true
      introduction: {}
      isocalendar:
        duration: full-year
      languages:
        limit: 8
        threshold: 1
        ignored: []
        other: false
        details: [percentage]
      habits:
        days: 14
        from: 200
        charts: true
        facts: true
        trim: false
      achievements:
        display: detailed
        secrets: true
        threshold: C
        limit: 0
      lines:
        limit: 4
      repositories:
        pinned: 4
        starred: 2
        forks: false
      activity:
        limit: 5
        days: 14
        ignored: []
      stars:
        limit: 4
      followup:
        sections: [repositories, user]
        archived: true
      stargazers:
        limit: 6
        days: 14
      people:
        limit: 14
        types: [followers, following]
      gists: {}
      discussions:
        categories: true
      notable:
        from: 5
      calendar:
        years: 1
      reactions:
        limit: 10
      contributors:
        limit: 4
        contributors_per_repo: 6
      code: {}
      topics:
        limit: 15
      licenses:
        limit: 8
      # loc:  # opt-in — clones repos, adds ~2min to CI
      #   limit: 4
      #   cache_dir: ~/.cache/metrics-loc
      projects:
        limit: 4
      sponsors: {}
      sponsorships: {}
      traffic:
        limit: 4
      skyline:
        max_height: 100
