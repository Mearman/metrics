# Omit `user` to auto-detect from the repository owner (fork mode)
# user: Mearman
timezone: Europe/London
template: classic

repos:
  fetch: all
  rules:
    - match: { visibility: private }
      action: count

outputs:
  - path: output/github-metrics.svg
    format: svg
    plugins:
      base:
        sections: [header, activity, community, repositories, metadata]
        indepth: true
      introduction: {}
      isocalendar:
        duration: full-year
      languages:
        limit: 8
        threshold: 1
        categories: [markup, programming]
        recent_days: 14
      habits:
        days: 14
        from: 200
        charts: true
        facts: true
      achievements:
        display: detailed
        secrets: true
        threshold: C
      lines:
        limit: 4
      repositories:
        pinned: 4
        starred: 2
      activity:
        limit: 5
        days: 14
      stars:
        limit: 4
      followup:
        sections: [repositories, user]
      stargazers:
        limit: 6
      people:
        limit: 14
        types: [followers, following]
      gists: {}
      discussions:
        categories: true
      notable:
        from: 5
      calendar:
        years: 1
      reactions:
        limit: 10
      contributors:
        limit: 4
        contributors_per_repo: 6
      code: {}
      topics:
        limit: 15
      licenses:
        limit: 8
      loc:
        limit: 4
      projects:
        limit: 4
      sponsors: {}
      sponsorships: {}
      traffic:
        limit: 4
