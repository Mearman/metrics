name: Metrics
on:
  schedule: [{ cron: "0 * * * *" }]
  workflow_dispatch:
  push:
    paths:
      - "src/**"
      - "fonts/**"
      - ".github/metrics.yml"

permissions:
  contents: read
  pages: write
  id-token: write
  read:user: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26

      - run: pnpm install --frozen-lockfile

      - name: Generate metrics
        run: node src/cli.ts --user "${{ github.repository_owner }}"
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN || github.token }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: output

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
