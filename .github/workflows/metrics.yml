name: Metrics
on:
  schedule: [{ cron: "0 * * * *" }]
  workflow_dispatch:
  push:
    paths:
      - "src/**"
      - "fonts/**"
      - ".github/metrics.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    environment: metrics
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v4
        with:
          path: ~/.cache/metrics-loc
          key: metrics-loc-${{ github.run_id }}
          restore-keys: |
            metrics-loc-

      - uses: ./
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          repos_fetch: all
          loc_cache_dir: ~/.cache/metrics-loc

      - uses: actions/upload-pages-artifact@v5
        with:
          path: output

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
